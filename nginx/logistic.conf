# ====================================================================
# FILE CẤU HÌNH NGINX REVERSE PROXY CHO LOGISTIC SYSTEM
# ====================================================================
# Cách dùng trên Server (Ubuntu):
# 1. sudo cp nginx/logistic.conf /etc/nginx/sites-available/logistic
# 2. sudo ln -s /etc/nginx/sites-available/logistic /etc/nginx/sites-enabled/
# 3. sudo rm -f /etc/nginx/sites-enabled/default
# 4. sudo nginx -t && sudo systemctl reload nginx
# ====================================================================

server {
    # Nginx lắng nghe ở cổng 80
    listen 80;
    
    # Tên miền (Domain) hoặc IP Public của Server
    server_name api.glolog.dev localhost; 

    # -----------------------------------------------------------
    # ROUTE 1: AUTH SERVICE (Chuyển hướng vào cổng 8080)
    # -----------------------------------------------------------
    location /auth/ {
        proxy_pass http://localhost:8080/;
        
        # Cấu hình các Header để truyền IP thật của User vào cho Backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------
    # ROUTE 2: MEDIA SERVICE (Chuyển hướng vào cổng 8082)
    # -----------------------------------------------------------
    location /media/ {
        proxy_pass http://localhost:8082/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------
    # ROUTE 3: MATCHING SERVICE (Chuyển hướng vào cổng 8081)
    # -----------------------------------------------------------
    location /matching/ {
        proxy_pass http://localhost:8081/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tùy chọn nâng cao: Bật Gzip để nén dữ liệu API cho nhẹ
    gzip on;
    gzip_types application/json;
    gzip_min_length 1000;
}
